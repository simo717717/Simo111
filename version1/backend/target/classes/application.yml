server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/photo_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 100MB
      max-request-size: 500MB

  main:
    allow-circular-references: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:QmVjYXVzZSB0aGUgZGF0YWJhc2Ugb2YgdGhlIE1hdHJpeCBpcyBjb25uZWN0ZWQgdG8gdGhlIHNvdXJjZSwgYW5kIHlvdSBkb24ndCBzdG9wIGxvb2tpbmcgYXQgaXQgdW5sZXNzIHlvdSBzZWUgaXQuIEludGVyZXN0IGlzIHRoZSBvbmx5IHRydXRo}
  expiration: ${JWT_EXPIRATION:86400000} # 24小时

# 文件存储路径
file:
  upload-dir: C:/Users/Simo/IdeaProjects/version1/uploads

# AI模型配置
ai:
  model:
    name: resnet50
    enabled: true
    confidence-threshold: 0.3
    top-k: 5
    cache-dir: C:/Users/Simo/.djl/cache
    download-timeout: 300000 # 5分钟超时
    max-retries: 3
    retry-delay-seconds: 10

logging:
  level:
    com.photo: DEBUG
    com.photo.service.AIService: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    ai.djl: INFO